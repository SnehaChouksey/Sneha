    <g transform="rotate(45)"><ellipse cy="-17" rx="5" ry="12" fill="#F5C430"/></g>
    <g transform="rotate(90)"><ellipse cy="-17" rx="5" ry="12" fill="#FFD700"/></g>
    <g transform="rotate(135)"><ellipse cy="-17" rx="5" ry="12" fill="#F5C430"/></g>
    <g transform="rotate(180)"><ellipse cy="-17" rx="5" ry="12" fill="#FFD700"/></g>
    <g transform="rotate(225)"><ellipse cy="-17" rx="5" ry="12" fill="#F5C430"/></g>
    <g transform="rotate(270)"><ellipse cy="-17" rx="5" ry="12" fill="#FFD700"/></g>
